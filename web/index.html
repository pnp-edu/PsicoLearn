  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <meta name="viewport" content="width=1280, initial-scale=0.3, maximum-scale=1.0, user-scalable=yes">
  <meta name="google-signin-client_id" content="474933138096-i9m8vn3qonujq4qgnq75jhu80flm6lsj.apps.googleusercontent.com">

  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <!-- Favicon -->

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0A0E12;
    }
    
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    flt-glass-pane {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // CACHE BUSTER: Force unregister any existing service workers so the user gets the fresh version
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('Unregistered SW to force update');
        }
      });
      caches.keys().then((keyList) => {
        return Promise.all(keyList.map((key) => {
          return caches.delete(key);
        }));
      });
    }
    
    // Force reload if not reloaded recently
    if (!sessionStorage.getItem('force_reloaded')) {
      sessionStorage.setItem('force_reloaded', 'true');
      setTimeout(() => {
        window.location.reload(true);
      }, 500);
    }
  </script>
  <script src="flutter_bootstrap.js?v=v3_desktop_force" async></script>
</body>
