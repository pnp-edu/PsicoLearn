<svg viewBox="0 0 500 130" xmlns="http://www.w3.org/2000/svg">
  <text x="250" y="16" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888">¿Qué ficha de dominó completa la serie lógica?</text>
  
  <!-- Ficha 1: 1/2 -->
  <g transform="translate(40, 28)">
    <rect x="0" y="0" width="60" height="90" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="4"/>
    <line x1="0" y1="45" x2="60" y2="45" stroke="#4FD1C5" stroke-width="2"/>
    <circle cx="30" cy="22" r="4" fill="#4FD1C5"/> <!-- 1 -->
    <circle cx="15" cy="60" r="4" fill="#4FD1C5"/> <circle cx="45" cy="75" r="4" fill="#4FD1C5"/> <!-- 2 -->
  </g>

  <text x="115" y="78" font-family="Arial" font-size="20" fill="#666">+</text>

  <!-- Ficha 2: 2/3 -->
  <g transform="translate(145, 28)">
    <rect x="0" y="0" width="60" height="90" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="4"/>
    <line x1="0" y1="45" x2="60" y2="45" stroke="#4FD1C5" stroke-width="2"/>
    <circle cx="15" cy="15" r="4" fill="#4FD1C5"/> <circle cx="45" cy="30" r="4" fill="#4FD1C5"/> <!-- 2 -->
    <circle cx="15" cy="55" r="4" fill="#4FD1C5"/> <circle cx="30" cy="67" r="4" fill="#4FD1C5"/> <circle cx="45" cy="80" r="4" fill="#4FD1C5"/> <!-- 3 -->
  </g>

  <text x="220" y="78" font-family="Arial" font-size="20" fill="#666">+</text>

  <!-- Ficha 3: 3/4 -->
  <g transform="translate(250, 28)">
    <rect x="0" y="0" width="60" height="90" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="4"/>
    <line x1="0" y1="45" x2="60" y2="45" stroke="#4FD1C5" stroke-width="2"/>
    <circle cx="15" cy="10" r="4" fill="#4FD1C5"/> <circle cx="30" cy="22" r="4" fill="#4FD1C5"/> <circle cx="45" cy="35" r="4" fill="#4FD1C5"/> <!-- 3 -->
    <circle cx="15" cy="55" r="4" fill="#4FD1C5"/> <circle cx="45" cy="55" r="4" fill="#4FD1C5"/> 
    <circle cx="15" cy="80" r="4" fill="#4FD1C5"/> <circle cx="45" cy="80" r="4" fill="#4FD1C5"/> <!-- 4 -->
  </g>

  <text x="325" y="78" font-family="Arial" font-size="20" fill="#666">→</text>

  <!-- Ficha 4: ? -->
  <g transform="translate(355, 28)">
    <rect x="0" y="0" width="60" height="90" fill="none" stroke="#f6ad55" stroke-width="2.5" rx="4" stroke-dasharray="5,3"/>
    <text x="30" y="55" font-family="Arial" font-size="30" fill="#f6ad55" text-anchor="middle">?</text>
  </g>
</svg>
