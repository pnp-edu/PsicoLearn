<svg viewBox="0 0 480 140" xmlns="http://www.w3.org/2000/svg">
  <text x="240" y="18" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888">Observa el patrón y determina cuál número falta</text>

  <!-- Cuadrícula 3x3 con número faltante -->
  <g transform="translate(130, 24)">
    <!-- Fila 1 -->
    <rect x="0" y="0" width="60" height="60" fill="none" stroke="#4FD1C5" stroke-width="2" rx="4"/>
    <text x="30" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#4FD1C5">2</text>

    <rect x="70" y="0" width="60" height="60" fill="none" stroke="#4FD1C5" stroke-width="2" rx="4"/>
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#4FD1C5">4</text>

    <rect x="140" y="0" width="60" height="60" fill="none" stroke="#4FD1C5" stroke-width="2" rx="4"/>
    <text x="170" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#4FD1C5">8</text>

    <!-- Fila 2 -->
    <rect x="0" y="70" width="60" height="60" fill="none" stroke="#4FD1C5" stroke-width="2" rx="4"/>
    <text x="30" y="110" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#4FD1C5">3</text>

    <rect x="70" y="70" width="60" height="60" fill="none" stroke="#4FD1C5" stroke-width="2" rx="4"/>
    <text x="100" y="110" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#4FD1C5">6</text>

    <rect x="140" y="70" width="60" height="60" fill="none" stroke="#4FD1C5" stroke-width="2" rx="4"/>
    <text x="170" y="110" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#4FD1C5">12</text>

    <!-- Fila 3 -->
    <rect x="0" y="140" width="60" height="60" fill="none" stroke="#4FD1C5" stroke-width="2" rx="4"/>
    <text x="30" y="180" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#4FD1C5">5</text>

    <rect x="70" y="140" width="60" height="60" fill="none" stroke="#4FD1C5" stroke-width="2" rx="4"/>
    <text x="100" y="180" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#4FD1C5">10</text>

    <rect x="140" y="140" width="60" height="60" fill="none" stroke="#f6ad55" stroke-width="2.5" rx="4" stroke-dasharray="6,4"/>
    <text x="170" y="180" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#f6ad55">?</text>
  </g>
</svg>
