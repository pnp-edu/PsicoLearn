<svg viewBox="0 0 560 110" xmlns="http://www.w3.org/2000/svg">
  <text x="280" y="16" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888">¿Cuántos triángulos hay en total en la figura?</text>

  <!-- Figura compleja de triángulos -->
  <g transform="translate(165, 22)">
    <!-- Triángulo grande exterior -->
    <polygon points="115,0 0,200 230,200" fill="none" stroke="#4FD1C5" stroke-width="3"/>
    <!-- Línea media horizontal -->
    <line x1="57.5" y1="100" x2="172.5" y2="100" stroke="#4FD1C5" stroke-width="2.5"/>
    <!-- Línea del vértice a media -->
    <line x1="115" y1="0" x2="115" y2="200" stroke="#4FD1C5" stroke-width="2.5"/>
    <!-- Triángulo interno izquierda -->
    <polygon points="57.5,100 0,200 115,200" fill="none" stroke="#4FD1C5" stroke-width="2.5"/>
    <!-- Sub-línea -->
    <line x1="57.5" y1="100" x2="115" y2="200" stroke="#4FD1C5" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
</svg>
