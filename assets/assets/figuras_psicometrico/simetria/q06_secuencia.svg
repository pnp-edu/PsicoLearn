<svg viewBox="0 0 500 130" xmlns="http://www.w3.org/2000/svg">
  <text x="250" y="16" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888">¿Cuál de las opciones representa el reflejo exacto (espejo) de la figura?</text>
  
  <!-- Figura Original -->
  <g transform="translate(100, 28)">
    <rect x="0" y="0" width="80" height="80" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="6"/>
    <!-- Un triángulo asimétrico adentro -->
    <polygon points="10,10 60,20 20,70" fill="none" stroke="#4FD1C5" stroke-width="2.5"/>
    <circle cx="60" cy="60" r="8" fill="#4FD1C5"/>
  </g>

  <!-- Línea de espejo -->
  <line x1="250" y1="20" x2="250" y2="110" stroke="#f6ad55" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="250" y="125" font-family="Arial" font-size="9" fill="#f6ad55" text-anchor="middle">ESPEJO</text>

  <!-- Interrogante -->
  <g transform="translate(320, 28)">
    <rect x="0" y="0" width="80" height="80" fill="none" stroke="#f6ad55" stroke-width="2" rx="6" stroke-dasharray="5,3"/>
    <text x="40" y="52" font-family="Arial" font-size="36" fill="#f6ad55" text-anchor="middle">?</text>
  </g>
</svg>
