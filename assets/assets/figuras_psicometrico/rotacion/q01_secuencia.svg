<svg viewBox="0 0 480 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Título -->
  <text x="240" y="18" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888">Observa la secuencia y encuentra la que continúa la lógica</text>

  <!-- FIGURA 1: cuadrado con punto arriba-derecha, flecha abajo-izquierda -->
  <g transform="translate(10, 28)">
    <rect x="0" y="0" width="90" height="90" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="6"/>
    <circle cx="80" cy="10" r="5" fill="#4FD1C5"/>
    <rect x="20" y="15" width="45" height="45" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="3"/>
    <circle cx="42" cy="37" r="15" fill="none" stroke="#4FD1C5" stroke-width="2.5"/>
    <line x1="42" y1="37" x2="10" y2="72" stroke="#4FD1C5" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="10,72 5,65 16,67" fill="#4FD1C5"/>
  </g>

  <!-- Flecha separadora -->
  <text x="112" y="78" font-family="Arial" font-size="22" fill="#4FD1C5">→</text>

  <!-- FIGURA 2: cuadrado con punto arriba-izquierda, flecha abajo-derecha -->
  <g transform="translate(135, 28)">
    <rect x="0" y="0" width="90" height="90" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="6"/>
    <circle cx="10" cy="10" r="5" fill="#4FD1C5"/>
    <circle cx="45" cy="45" r="25" fill="none" stroke="#4FD1C5" stroke-width="2.5"/>
    <circle cx="45" cy="45" r="13" fill="none" stroke="#4FD1C5" stroke-width="2.5"/>
    <line x1="45" y1="45" x2="80" y2="80" stroke="#4FD1C5" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="80,80 84,73 74,77" fill="#4FD1C5"/>
  </g>

  <!-- Flecha separadora -->
  <text x="237" y="78" font-family="Arial" font-size="22" fill="#4FD1C5">→</text>

  <!-- FIGURA 3: cuadrado con punto abajo-derecha, flecha arriba-izquierda -->
  <g transform="translate(260, 28)">
    <rect x="0" y="0" width="90" height="90" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="6"/>
    <circle cx="80" cy="80" r="5" fill="#4FD1C5"/>
    <rect x="20" y="20" width="45" height="45" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="3"/>
    <circle cx="42" cy="42" r="15" fill="none" stroke="#4FD1C5" stroke-width="2.5"/>
    <line x1="42" y1="42" x2="10" y2="10" stroke="#4FD1C5" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="10,10 17,5 14,16" fill="#4FD1C5"/>
  </g>

  <!-- Flecha separadora -->
  <text x="362" y="78" font-family="Arial" font-size="22" fill="#4FD1C5">→</text>

  <!-- FIGURA 4: interrogante -->
  <g transform="translate(385, 28)">
    <rect x="0" y="0" width="90" height="90" fill="none" stroke="#f6ad55" stroke-width="2.5" rx="6" stroke-dasharray="6,4"/>
    <text x="45" y="58" font-family="Arial, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#f6ad55">?</text>
  </g>
</svg>
