<svg viewBox="0 0 500 130" xmlns="http://www.w3.org/2000/svg">
  <text x="250" y="16" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888">Las figuras siguen una rotación. ¿Qué figura completa la secuencia?</text>

  <!-- Figura 1: Flecha apuntando arriba -->
  <g transform="translate(20, 28)">
    <rect x="0" y="0" width="90" height="90" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="8"/>
    <polygon points="45,12 20,60 45,50 70,60" fill="none" stroke="#4FD1C5" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="45" y1="50" x2="45" y2="78" stroke="#4FD1C5" stroke-width="6" stroke-linecap="round"/>
  </g>

  <text x="120" y="78" font-family="Arial" font-size="20" fill="#666">→</text>

  <!-- Figura 2: Flecha apuntando derecha (rotada 90°) -->
  <g transform="translate(140, 28)">
    <rect x="0" y="0" width="90" height="90" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="8"/>
    <polygon points="78,45 30,20 40,45 30,70" fill="none" stroke="#4FD1C5" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="40" y1="45" x2="12" y2="45" stroke="#4FD1C5" stroke-width="6" stroke-linecap="round"/>
  </g>

  <text x="240" y="78" font-family="Arial" font-size="20" fill="#666">→</text>

  <!-- Figura 3: Flecha apuntando abajo (rotada 180°) -->
  <g transform="translate(260, 28)">
    <rect x="0" y="0" width="90" height="90" fill="none" stroke="#4FD1C5" stroke-width="2.5" rx="8"/>
    <polygon points="45,78 20,30 45,40 70,30" fill="none" stroke="#4FD1C5" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="45" y1="40" x2="45" y2="12" stroke="#4FD1C5" stroke-width="6" stroke-linecap="round"/>
  </g>

  <text x="360" y="78" font-family="Arial" font-size="20" fill="#666">→</text>

  <!-- Figura 4: Interrogante (debe ser flecha izquierda) -->
  <g transform="translate(380, 28)">
    <rect x="0" y="0" width="90" height="90" fill="none" stroke="#f6ad55" stroke-width="2.5" rx="8" stroke-dasharray="6,4"/>
    <text x="45" y="58" font-family="Arial, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" fill="#f6ad55">?</text>
  </g>
</svg>
